<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tạo đề in offline</title>
  <link rel="icon" href="data:,">
  <style>
    :root {
      --ink: #171717;
      --muted: #5d5965;
      --line: #d7d2dc;
      --paper: #ffffff;
      --bg: #f3f0e9;
      --accent: #1d4ed8;
      --font-size: 10pt;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: Arial, Helvetica, sans-serif;
    }

    button,
    input,
    label,
    select {
      font: inherit;
    }

    .toolbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 10px;
      padding: 12px;
      background: #fffffff2;
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px #00000014;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #bab5c0;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
    }

    .check {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px;
      border: 1px solid #bab5c0;
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      font-weight: 700;
    }

    .actions {
      display: flex;
      gap: 8px;
      align-items: end;
    }

    .btn {
      min-height: 38px;
      border: 0;
      border-radius: 8px;
      padding: 0 14px;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn.secondary {
      background: #111827;
    }

    .notice {
      grid-column: 1 / -1;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.35;
    }

    .page {
      width: 210mm;
      min-height: 297mm;
      margin: 12px auto;
      padding: 8mm;
      background: var(--paper);
      box-shadow: 0 12px 36px #00000022;
    }

    .exam {
      font-size: var(--font-size);
      line-height: 1.18;
    }

    .exam-header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 6mm;
      align-items: start;
      padding-bottom: 3mm;
      border-bottom: 1px solid #000;
    }

    .exam-header h1 {
      margin: 0 0 2mm;
      font-size: 15pt;
      line-height: 1;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .student-info {
      display: grid;
      grid-template-columns: auto minmax(34mm, 1fr) auto 22mm;
      gap: 1.5mm 2mm;
      margin-top: 2mm;
      align-items: end;
      max-width: 130mm;
    }

    .line {
      border-bottom: 1px dotted #000;
      min-height: 4mm;
    }

    .code-box {
      min-width: 42mm;
      padding: 2mm 3mm;
      border: 1px solid #000;
      text-align: center;
      font-weight: 700;
    }

    .code-box strong {
      display: block;
      margin-top: 1mm;
      font-size: 18pt;
      letter-spacing: 1px;
    }

    .answer-sheet {
      margin: 3mm 0;
      padding-bottom: 2mm;
      border-bottom: 1px solid #000;
      break-inside: avoid;
      page-break-inside: avoid;
    }

    .answer-sheet-title {
      margin: 0 0 1.5mm;
      font-weight: 700;
    }

    .bubble-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.2mm 2mm;
      align-items: start;
    }

    .bubble-column,
    .key-column {
      display: grid;
      gap: 1.2mm;
    }

    .bubble-item {
      display: grid;
      grid-template-columns: 8mm repeat(4, 1fr);
      gap: 1mm;
      align-items: center;
      white-space: nowrap;
    }

    .bubble-num {
      font-weight: 700;
      text-align: right;
    }

    .bubble-choice {
      display: inline-flex;
      align-items: center;
      font-size: .92em;
    }

    .circle {
      width: 4mm;
      height: 4mm;
      display: inline-grid;
      place-items: center;
      border: 1px solid #000;
      border-radius: 50%;
      color: #000;
      font-size: 2.15mm;
      line-height: 1;
      font-weight: 700;
    }

    .questions {
      column-count: 2;
      column-gap: 6mm;
      column-rule: 1px solid #d9d9d9;
    }

    .question {
      break-inside: avoid;
      page-break-inside: avoid;
      margin: 0 0 2.4mm;
      padding: 0 0 1.8mm;
      border-bottom: 1px dotted #c7c7c7;
    }

    .q-text {
      margin: 0 0 1mm;
      font-weight: 700;
    }

    .q-meta {
      color: #555;
      font-size: .88em;
      font-weight: 400;
    }

    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .7mm 2mm;
    }

    .option {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .option.correct {
      font-weight: 900;
      text-decoration: underline;
    }

    .answer-page {
      break-before: page;
      page-break-before: always;
    }

    .answer-page.no-answer-key {
      display: none;
    }

    .key-title {
      margin: 0 0 3mm;
      text-align: center;
      font-size: 15pt;
      text-transform: uppercase;
    }

    .key-meta {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3mm;
      font-weight: 700;
    }

    .key-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1.2mm 2mm;
      font-size: var(--font-size);
      align-items: start;
    }

    .key-item {
      display: grid;
      grid-template-columns: 8mm repeat(4, 1fr);
      gap: 1mm;
      align-items: center;
    }

    .key-choice {
      display: inline-flex;
      align-items: center;
    }

    .key-choice.hit .circle {
      background: #000;
      color: #fff;
    }

    .empty {
      padding: 12px;
      color: var(--muted);
      text-align: center;
    }

    @media (max-width: 980px) {
      .toolbar {
        position: static;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .page {
        width: calc(100% - 20px);
        min-height: auto;
      }
    }

    @page {
      size: A4;
      margin: 7mm;
    }

    @media print {
      :root {
        --font-size: var(--print-font-size);
      }

      body {
        background: #fff;
      }

      .toolbar {
        display: none;
      }

      .page {
        width: auto;
        min-height: auto;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }

      .question {
        margin-bottom: 2mm;
        padding-bottom: 1.4mm;
      }

      .answer-sheet {
        display: block;
        visibility: visible;
        print-color-adjust: exact;
        -webkit-print-color-adjust: exact;
      }

      .answer-page.no-answer-key {
        display: none;
      }
    }
  </style>
</head>
<body>
  <form class="toolbar" id="controlForm">
    <label class="field">
      <span>Mã đề</span>
      <input id="examCodeInput" placeholder="Để trống để tự tạo">
    </label>
    <label class="field">
      <span>Số câu hỏi</span>
      <input id="questionCountInput" type="number" min="1" max="284" value="40">
    </label>
    <label class="field">
      <span>Font size</span>
      <select id="fontSizeInput">
        <option value="8.5pt">8.5pt - siêu tiết kiệm</option>
        <option value="9pt">9pt - tiết kiệm</option>
        <option value="10pt" selected>10pt - dễ đọc</option>
        <option value="11pt">11pt - rộng rãi</option>
        <option value="12pt">12pt - rất dễ đọc</option>
      </select>
    </label>
    <label class="check">
      <input id="separateAnswerInput" type="checkbox" checked>
      In đáp án ra trang riêng
    </label>
    <label class="check">
      <input id="boldAnswerInput" type="checkbox">
      In đậm đáp án trên câu hỏi
    </label>
    <div class="actions">
      <button class="btn" type="submit">Tạo đề</button>
      <button class="btn secondary" id="printBtn" type="button">In / Lưu PDF</button>
    </div>
    <div class="notice" id="notice">Gợi ý: nhập lại đúng mã đề và số câu để hiển thị lại đề cũ.</div>
  </form>

  <main class="page">
    <section class="exam" id="exam"></section>
  </main>

  <script>
    const LETTERS = ["A", "B", "C", "D"];
    const $ = (id) => document.getElementById(id);

    const state = {
      questions: [],
      paper: null
    };

    init();

    async function init() {
      bindEvents();
      const response = await fetch("questions.json", { cache: "no-store" });
      state.questions = await response.json();
      $("questionCountInput").max = state.questions.length;

      const params = new URLSearchParams(location.search);
      if (params.get("code")) $("examCodeInput").value = params.get("code");
      if (params.get("count")) $("questionCountInput").value = params.get("count");
      if (params.get("font")) $("fontSizeInput").value = params.get("font");

      generatePaper();
    }

    function bindEvents() {
      $("controlForm").addEventListener("submit", (event) => {
        event.preventDefault();
        generatePaper();
      });
      $("printBtn").addEventListener("click", () => window.print());
      $("fontSizeInput").addEventListener("change", () => {
        document.documentElement.style.setProperty("--font-size", $("fontSizeInput").value);
        document.documentElement.style.setProperty("--print-font-size", $("fontSizeInput").value);
      });
      $("separateAnswerInput").addEventListener("change", renderPaper);
      $("boldAnswerInput").addEventListener("change", renderPaper);
    }

    function generatePaper() {
      if (!state.questions.length) return;

      const count = clamp(Number($("questionCountInput").value || 40), 1, state.questions.length);
      $("questionCountInput").value = count;

      let code = $("examCodeInput").value.trim().toUpperCase();
      if (!code) {
        code = makeExamCode();
        $("examCodeInput").value = code;
      }

      const seed = hashString(`${code}|${count}|english-quiz-print`);
      const random = mulberry32(seed);
      const questions = shuffleWithRandom([...state.questions], random)
        .slice(0, count)
        .map((question, index) => {
          const options = shuffleWithRandom([...question.options], random).slice(0, 4);
          if (!options.includes(question.answer)) {
            options[options.length - 1] = question.answer;
            shuffleWithRandom(options, random);
          }
          return {
            ...question,
            printNumber: index + 1,
            printOptions: options
          };
        });

      state.paper = {
        code,
        count,
        createdAt: new Date(),
        questions
      };

      updateUrl(code, count);
      renderPaper();
    }

    function renderPaper() {
      if (!state.paper) return;

      document.documentElement.style.setProperty("--font-size", $("fontSizeInput").value);
      document.documentElement.style.setProperty("--print-font-size", $("fontSizeInput").value);

      const answerPageClass = $("separateAnswerInput").checked ? "answer-page" : "answer-page no-answer-key";
      $("exam").innerHTML = `
        ${renderHeader()}
        ${renderAnswerSheet(false)}
        <section class="questions">
          ${state.paper.questions.map(renderQuestion).join("")}
        </section>
        <section class="${answerPageClass}">
          <h2 class="key-title">Bảng đáp án</h2>
          <div class="key-meta">
            <span>Mã đề: ${escapeHtml(state.paper.code)}</span>
            <span>Số câu: ${state.paper.count}</span>
          </div>
          ${renderAnswerSheet(true)}
        </section>
      `;
    }

    function renderHeader() {
      return `
        <header class="exam-header">
          <div>
            <h1>Đề kiểm tra tiếng Anh</h1>
            <div class="student-info">
              <span>Họ và tên:</span><span class="line"></span>
              <span>Lớp:</span><span class="line"></span>
            </div>
          </div>
          <div class="code-box">
            Mã đề
            <strong>${escapeHtml(state.paper.code)}</strong>
          </div>
        </header>
      `;
    }

    function renderAnswerSheet(withKey) {
      const columns = makeColumns(state.paper.questions, 5);
      const rows = columns.map((column) => `
        <div class="${withKey ? "key-column" : "bubble-column"}">
          ${column.map((question) => {
        const correctIndex = question.printOptions.indexOf(question.answer);
        return `
          <div class="${withKey ? "key-item" : "bubble-item"}">
            <span class="bubble-num">${question.printNumber}.</span>
            ${LETTERS.map((letter, index) => `
              <span class="${withKey ? `key-choice ${index === correctIndex ? "hit" : ""}` : "bubble-choice"}">
                <i class="circle">${letter}</i>
              </span>
            `).join("")}
          </div>
        `;
      }).join("")}
        </div>
      `).join("");

      return `
        <section class="answer-sheet">
          <p class="answer-sheet-title">${withKey ? "Đáp án để chấm" : "Bảng điền câu trả lời"}</p>
          <div class="${withKey ? "key-grid" : "bubble-grid"}">${rows}</div>
        </section>
      `;
    }

    function makeColumns(items, columnCount) {
      const columnSize = Math.ceil(items.length / columnCount);
      return Array.from({ length: columnCount }, (_, index) => {
        const start = index * columnSize;
        return items.slice(start, start + columnSize);
      }).filter((column) => column.length);
    }

    function renderQuestion(question) {
      const correctClass = $("boldAnswerInput").checked ? "correct" : "";
      return `
        <article class="question">
          <p class="q-text">
            ${question.printNumber}. ${escapeHtml(question.question)}
            <span class="q-meta">(${escapeHtml(question.level)})</span>
          </p>
          <div class="options">
            ${question.printOptions.map((option, index) => `
              <div class="option ${option === question.answer ? correctClass : ""}">
                ${LETTERS[index]}. ${escapeHtml(option)}
              </div>
            `).join("")}
          </div>
        </article>
      `;
    }

    function makeExamCode() {
      const alphabet = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
      const random = new Uint32Array(5);
      crypto.getRandomValues(random);
      return Array.from(random, (value) => alphabet[value % alphabet.length]).join("");
    }

    function updateUrl(code, count) {
      const params = new URLSearchParams(location.search);
      params.set("code", code);
      params.set("count", count);
      params.set("font", $("fontSizeInput").value);
      history.replaceState(null, "", `${location.pathname}?${params.toString()}`);
      $("notice").textContent = `Đã tạo mã đề ${code}. Lưu mã này để mở lại đúng đề cũ.`;
    }

    function hashString(value) {
      let hash = 2166136261;
      for (let index = 0; index < value.length; index += 1) {
        hash ^= value.charCodeAt(index);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function mulberry32(seed) {
      return function random() {
        let value = seed += 0x6D2B79F5;
        value = Math.imul(value ^ value >>> 15, value | 1);
        value ^= value + Math.imul(value ^ value >>> 7, value | 61);
        return ((value ^ value >>> 14) >>> 0) / 4294967296;
      };
    }

    function shuffleWithRandom(array, random) {
      for (let index = array.length - 1; index > 0; index -= 1) {
        const swapIndex = Math.floor(random() * (index + 1));
        [array[index], array[swapIndex]] = [array[swapIndex], array[index]];
      }
      return array;
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      })[char]);
    }
  </script>
</body>
</html>
